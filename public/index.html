<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aniko — Anime Streaming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header class="header">
    <a href="/" class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span>Aniko</span>
    </a>
    <div class="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off">
    </div>
  </header>

  <!-- ─── Main Content ────────────────────────────────────────── -->
  <main class="main">
    <!-- Home / Search Page -->
    <div id="homePage" class="page active">
      <div class="home-hero">
        <h1>Welcome to Aniko</h1>
        <p>Search for any anime and start watching</p>
      </div>
      <div id="searchResults" class="grid"></div>
      <div id="searchLoading" class="loading hidden">
        <div class="spinner"></div>
        <span>Searching...</span>
      </div>
    </div>

    <!-- Anime Detail / Episodes Page -->
    <div id="animePage" class="page">
      <div id="animeHeader" class="anime-header"></div>
      <div class="audio-tabs">
        <button class="tab active" data-audio="sub">SUB</button>
        <button class="tab" data-audio="dub">DUB</button>
      </div>
      <div id="episodeList" class="episode-grid"></div>
      <div id="episodeLoading" class="loading hidden">
        <div class="spinner"></div>
        <span>Loading episodes...</span>
      </div>
    </div>

    <!-- Watch Page -->
    <div id="watchPage" class="page">
      <div class="watch-layout">
        <div class="player-area">
          <div id="playerContainer" class="player-container">
            <video id="videoPlayer" crossorigin playsinline></video>
            <div id="playerLoading" class="player-overlay">
              <div class="spinner"></div>
              <span>Loading stream...</span>
            </div>
            <div id="playerError" class="player-overlay hidden">
              <span id="playerErrorMsg">Stream unavailable</span>
            </div>
          </div>
          <div class="player-info">
            <h2 id="watchTitle"></h2>
            <p id="watchEpInfo"></p>
          </div>
          <!-- Server selector -->
          <div class="server-section">
            <h3>Servers</h3>
            <div id="serverList" class="server-list"></div>
          </div>
        </div>
        <div class="episode-sidebar">
          <h3>Episodes</h3>
          <div id="sidebarEpisodes" class="sidebar-episodes"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <script src="/app.js"></script>
</body>
</html>
